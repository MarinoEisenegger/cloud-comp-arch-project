# By default, your evolution will run for 50 iterations; feel free to change this value as needed.
# At any time, you can resume evolution from a specific checkpoint by providing the --checkpoint flag to openevolve-run.
max_iterations: 50
checkpoint_interval: 1 # Do not change this

llm:
  api_base: "https://api.swissai.cscs.ch/v1"
  primary_model: "Qwen/Qwen3-Coder-30B-A3B-Instruct"
  top_p: 0.7 # Feel free to experiment with this value
  # Possible additional parameters to configure the LLM:
  # temperature: 
  # max_tokens: 
  # timeout: 

prompt:
  # Prompts to provide the LLM with. You can directly write the prompt in the config, e.g.
  # system_message: |
  #   You are an expert programmer tasked with optimizing the following code...
  #
  # Alternatively, you can create files containing the prompts, and reference them here, e.g.
  # template_dir: "<path-to-prompt-directory>"
  # system_message: "name_of_file"
  #
  # The system message will be the content of the file <path-to-prompt-directory>/name_of_file.txt
  system_message: |
    You are an expert programmer tasked with optimizing the scheduling of 7 batch jobs
    on a cluster of 2 machines:
      - Machine a: 8 CPU cores (cores 0-7), all available for batch jobs
      - Machine b: 4 CPU cores (cores 0-3), where core 3 is permanently reserved
        for memcached — only cores 0-2 are available for batch jobs

    OBJECTIVE
    ---------
    Minimize total wall-clock execution time (score improves as time drops below
    6 minutes), while keeping the 95th percentile memcached tail latency below 1ms.
    Since memcached runs on machine b, avoid scheduling high-interference or
    memory-bandwidth-heavy jobs there.

    CONSTRAINTS
    -----------
    - Jobs pinned to N cores must use exactly N threads.
    - Jobs within a partition run sequentially; partitions across the cluster run
      in parallel.
    - Do not exceed available cores per machine (8 on a, 3 on b).
    - Core ranges on the same machine must not overlap.
    - WARNING: Some job combinations cause timeouts (e.g. due to memory
      constraints). Always check the `error` field in evaluation results first.
      A timeout scores 0.

    JOB DATA
    --------
    Barnes:
      Threads → seconds: 1→133, 2→68 (1.95x), 4→35 (3.8x), 8→28 (4.8x)
      Interference:  cpu:1.53  l1d:1.63  l1i:1.55  l2:1.58  llc:1.74  memBW:1.70

    Blackscholes:
      Threads → seconds: 1→127, 2→74 (1.71x), 4→48 (2.65x), 8→38 (3.34x)
      Interference:  cpu:1.52  l1d:1.49  l1i:1.54  l2:1.50  llc:1.65  memBW:1.67

    Canneal:
      Threads → seconds: 1→256, 2→156 (1.64x), 4→102 (2.51x), 8→80 (3.2x)
      Interference:  cpu:1.23  l1d:1.28  l1i:1.21  l2:1.35  llc:1.47  memBW:1.70

    Freqmine:
      Threads → seconds: 1→501, 2→254 (1.95x), 4→128 (3.8x), 8→104 (4.8x)
      Interference:  cpu:2.25  l1d:1.43  l1i:2.18  l2:1.40  llc:1.73  memBW:1.64

    Radix:
      Threads → seconds: 1→54,  2→27 (2x),   4→14 (3.8x), 8→9  (4.8x)
      Interference:  cpu:1.12  l1d:1.22  l1i:1.05  l2:1.06  llc:1.18  memBW:1.24

    Streamcluster:
      Threads → seconds: 1→651, 2→334 (1.95x), 4→172 (3.8x), 8→109 (4.8x)
      Interference:  cpu:1.90  l1d:2.38  l1i:1.67  l2:1.85  llc:2.30  memBW:2.16

    Vips:
      Threads → seconds: 1→105, 2→71 (1.48x), 4→41 (2.56x), 8→24 (4.38x)
      Interference:  cpu:1.72  l1d:1.85  l1i:1.80  l2:1.70  llc:1.89  memBW:1.84

    EVALUATION FEEDBACK
    -------------------
    You will receive:
      - combined_score: float in [0,1], computed as:

          time_score    = max(0, 480 - total_time) / 480
          latency_score = max(-1.0, (1000 - tail_latency) / 700)

          if latency_score <= 0:   combined_score = max(0, latency_score) * 0.1
          else:                    combined_score = time_score + (0.1 * latency_score)

      - tail_latency:   Worst-case p95 memcached latency in microseconds.
      - error:          ALWAYS check this first. "Timed out after 8 minutes" = 0.
      - time_score:     Raw time component before latency penalty (for debugging).
      - latency_score:  Raw latency component (for debugging).
      - timings:        Per-job and total execution times.

    CURRENT BEST SCHEDULE (baseline — improve upon it)
    ---------------------------------------------------
      Partition 1 — node-a, cores 0-7, 8 threads: [freqmine, streamcluster, canneal,
                                                    blackscholes, vips, barnes, radix]

    Estimated sequential runtime with 8 threads:
      freqmine=104s, streamcluster=109s, canneal=80s,
      blackscholes=38s, vips=24s, barnes=28s, radix=9s → total ≈ 392s → score ≈ 0

    This baseline is intentionally poor. The key insight to exploit is parallelism:
    split jobs across multiple partitions that run simultaneously.

    OPTIMIZATION STRATEGY HINTS
    ----------------------------
    - The single biggest win is splitting jobs across partitions so they run in
      parallel instead of sequentially. E.g. splitting node a into two 4-core partitions
    - Streamcluster (109s at 8t) and Freqmine (104s at 8t) are the two heaviest jobs
      — they should each be in their own partition if possible, not sequential.
    - Machine b (cores 0-2, 3 threads) is free — use it. But not all jobs are suitable for b due to interference and memory bandwidth concerns.
    - Radix also seems to timeout on machine b — avoid it there.
    - Radix is very short (9s at 8t, 14s at 4t) — it barely affects makespan, pair
      it with any heavy job and it will finish well before that job does.
    - threads should exactly equal the number of cores in the range (e.g. cores "0-3"
      → threads: 4)
    - A good target: total wall-clock time under 240 (score > 0.33).

    CODE SCHEMA — your output must match this exactly
    -------------------------------------------------
    You are rewriting ONLY the `Scheduler.__init__` method.
    `self.worker_config` is a list of dicts, each with these keys:

      {
        "node":    "node-a-8core" | "node-b-4core",
        "cores":   "<start>-<end>",   # e.g. "0-7" or "0-2"
        "threads": <int>,             # MUST equal end - start + 1
        "jobs":    ["jobname", ...]   # run sequentially by this worker
      }

    Hard rules — any violation scores 0:
      ❌ All 7 jobs must appear exactly once: freqmine, streamcluster, canneal,
         blackscholes, vips, barnes, radix
      ❌ node-b cores must stay within 0-2 (core 3 is reserved)
      ❌ Total cores used per node must not exceed: a→8, b→3
      ❌ Do not modify anything outside the Scheduler class
        

# You can learn more about these and other parameters here: https://github.com/algorithmicsuperintelligence/openevolve/blob/main/configs/default_config.yaml
database:
  population_size: 200 # Do not change this
  # Relevant parameters:
  # num_islands: 
  # elite_selection_ratio: 
  # exploitation_ratio: 

# Evaluator configuration
evaluator:
  timeout: 600 # 10 minutes to allow for some overhead beyond the 8 minute program timeout
  cascade_evaluation: false
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 50000

# By default, your evolution will run for 50 iterations; feel free to change this value as needed.
# At any time, you can resume evolution from a specific checkpoint by providing the --checkpoint flag to openevolve-run.
max_iterations: 5
checkpoint_interval: 1 # Do not change this

llm:
  api_base: "https://api.swissai.cscs.ch/v1"
  primary_model: "swiss-ai/Apertus-70B-Instruct-2509"
  top_p: 0.7 # Feel free to experiment with this value
  # Possible additional parameters to configure the LLM:
  # temperature: 
  # max_tokens: 
  # timeout: 

prompt:
  # Prompts to provide the LLM with. You can directly write the prompt in the config, e.g.
  # system_message: |
  #   You are an expert programmer tasked with optimizing the following code...
  #
  # Alternatively, you can create files containing the prompts, and reference them here, e.g.
  # template_dir: "<path-to-prompt-directory>"
  # system_message: "name_of_file"
  #
  # The system message will be the content of the file <path-to-prompt-directory>/name_of_file.txt
  system_message: |
    You are an expert programmer tasked with optimizing the scheduling of 7 batch jobs on a cluster of 2 machines.
    One machine has 4 CPU cores and the other has 8 CPU cores.
    On the 4 CPU core machine, 1 core (fourth one) is consistently used for memcached. The remaining 3 cores (0-2), 
    and the 8 cores from the other machine are available for the batch jobs.
    There is a trade off when scheduling: You want parallel execution to minimize the total execution time,
    but the jobs have different sensitivity to interference from other jobs (listed below). Also, the jobs
    have different execution times depending on the amount of threads, with non-linear speedups (both listed below).

    Your goal is to minimize the total execution time, while you also have to ensure a 95th percentile
    tail latency below 1ms for memcached.

    List of (parsec / splash2x) jobs:
    - Barnes: 
      - Runtime per threads (seconds): 
        - 1: 133
        - 2: 68 (1.95x)
        - 4: 35 (3.8x)
        - 8: 28 (4.8x)
      - Normalized runtime with interference:
        - cpu: 1.53
        - l1d: 1.63
        - l1i: 1.55
        - l2: 1.58
        - llc: 1.74
        - memBW: 1.70

    - Blackscholes: 
      - Runtime per threads (seconds): 
        - 1: 127
        - 2: 74 (1.71x)
        - 4: 48 (2.65x)
        - 8: 38 (3.34x)
      - Normalized runtime with interference:
        - cpu: 1.52
        - l1d: 1.49
        - l1i: 1.54
        - l2: 1.50
        - llc: 1.65
        - memBW: 1.67

    - Canneal: 
      - Runtime per threads (seconds): 
        - 1: 256
        - 2: 156 (1.64x)
        - 4: 102 (2.51x)
        - 8: 80 (3.2x)
      - Normalized runtime with interference:
        - cpu: 1.23
        - l1d: 1.28
        - l1i: 1.21
        - l2: 1.35
        - llc: 1.47
        - memBW: 1.70

    - Freqmine: 
      - Runtime per threads (seconds): 
        - 1: 501
        - 2: 254 (1.95x)
        - 4: 128 (3.8x)
        - 8: 104 (4.8x)
      - Normalized runtime with interference:
        - cpu: 2.25
        - l1d: 1.43
        - l1i: 2.18
        - l2: 1.40
        - llc: 1.73
        - memBW: 1.64

    - Radix: 
      - Runtime per threads (seconds): 
        - 1: 54
        - 2: 27 (2x)
        - 4: 14 (3.8x)
        - 8: 9 (4.8x)
      - Normalized runtime with interference:
        - cpu: 1.12
        - l1d: 1.22
        - l1i: 1.05
        - l2: 1.06
        - llc: 1.18
        - memBW: 1.24
    
    - Streamcluster: 
      - Runtime per threads (seconds): 
        - 1: 651
        - 2: 334 (1.95x)
        - 4: 172 (3.8x)
        - 8: 109 (4.8x)
      - Normalized runtime with interference:
        - cpu: 1.9
        - l1d: 2.38
        - l1i: 1.67
        - l2: 1.85
        - llc: 2.30
        - memBW: 2.16

    - Vips: 
      - Runtime per threads (seconds): 
        - 1: 105
        - 2: 71 (1.48x)
        - 4: 41 (2.56x)
        - 8: 24 (4.38x)
      - Normalized runtime with interference:
        - cpu: 1.72
        - l1d: 1.85
        - l1i: 1.80
        - l2: 1.70
        - llc: 1.89
        - memBW: 1.84

    You will receive evaluationresults:
      - metrics:
        - combined_score: Score based on how much smaller the total execution time is than 5 minutes (normalized to [0,1]). 0 if tail latency is above 1ms
        - tail_latency: 95th percentile latency of memcached in microseconds
      
      - artifacts:
        - error: If something went wrong during evaluation, this field will contain a string describing the error. Otherwise, it will be "None".
        - timings: A dictionary containing the execution time of each job, as well as the total execution time

    You should provide your schedule in the form of yaml with 7 entries, following specification:
    YAML format
    -----------
    <job-suffix>:          # e.g. freqmine  →  launched as parsec-freqmine
        node  : "a"        # "a" = node-a-8core  |  "b" = node-b-4core
        cores : "0-3"
        order : 1          # lower = higher priority within the same slot

    Remember: You have available on a: 0-7 and b: 0-2 (3 is already in use by memcached)
    

# You can learn more about these and other parameters here: https://github.com/algorithmicsuperintelligence/openevolve/blob/main/configs/default_config.yaml
database:
  population_size: 200 # Do not change this
  # Relevant parameters:
  # num_islands: 
  # elite_selection_ratio: 
  # exploitation_ratio: 

# Evaluator configuration
evaluator:
  timeout: 700
  cascade_evaluation: false
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 50000
